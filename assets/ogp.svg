<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="900" cy="180" r="120" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.1"/>
  <circle cx="950" cy="220" r="80" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.1"/>
  <circle cx="1050" cy="400" r="160" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.06"/>

  <!-- Terminal icon -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="56" height="56" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="12" y="38" font-family="monospace" font-size="28" fill="#38bdf8">&gt;_</text>
  </g>

  <!-- Title -->
  <text x="160" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold" fill="#f8fafc">toban-cli</text>

  <!-- Tagline -->
  <text x="82" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Orchestrate AI coding agents from your terminal</text>

  <!-- Feature pills -->
  <g transform="translate(82, 350)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="90" y="26" font-family="system-ui, sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">Sprint Management</text>

    <rect x="200" y="0" width="180" height="40" rx="20" fill="#818cf8" fill-opacity="0.1" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="290" y="26" font-family="system-ui, sans-serif" font-size="16" fill="#818cf8" text-anchor="middle">Git Worktree Isolation</text>

    <rect x="400" y="0" width="160" height="40" rx="20" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="480" y="26" font-family="system-ui, sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">Real-time Streaming</text>

    <rect x="580" y="0" width="160" height="40" rx="20" fill="#818cf8" fill-opacity="0.1" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <text x="660" y="26" font-family="system-ui, sans-serif" font-size="16" fill="#818cf8" text-anchor="middle">Manager LLM</text>
  </g>

  <!-- Code snippet -->
  <g transform="translate(82, 430)">
    <rect x="0" y="0" width="600" height="100" rx="8" fill="#020617" stroke="#334155" stroke-width="1"/>
    <text x="20" y="35" font-family="monospace" font-size="16" fill="#64748b">$</text>
    <text x="40" y="35" font-family="monospace" font-size="16" fill="#e2e8f0">npx toban-cli@latest start</text>
    <text x="20" y="65" font-family="monospace" font-size="14" fill="#38bdf8">Agents pick up tasks and start coding...</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity="0.6"/>

  <!-- toban.dev -->
  <text x="1120" y="590" font-family="system-ui, sans-serif" font-size="18" fill="#64748b" text-anchor="end">toban.dev</text>
</svg>
